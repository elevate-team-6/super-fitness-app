name: Quality Assurance (Lint & Analyze)

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    types: [opened, edited, synchronize, reopened]


# Cancel old runs if a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_lint:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # firebase_options.dart is generated by the FlutterFire CLI and gitignored
      # (it differs per environment), so the analyzer can't see it here. Restore
      # it from a secret instead.
      - name: 🔥 Restore Firebase options
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 -d > lib/firebase_options.dart

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🏗️ Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: ✨ Check Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: 🔍 Run Analyzer
        run: flutter analyze --fatal-infos --fatal-warnings