name: Android Distribution (Firebase)

# ==============================================================================
# 📝 HOW TO USE AUTOMATED VERSIONING (Semantic Versioning)
# ==============================================================================
# This workflow uses commit messages to determine the next version number:
#
# 1. PATCH (1.0.0 -> 1.0.1): Use "fix: ..." in your commit message.
#    Example: `git commit -m "fix: resolve login crash"`
#
# 2. MINOR (1.0.0 -> 1.1.0): Use "feat: ..." in your commit message.
#    Example: `git commit -m "feat: add profile screen"`
#
# 3. MAJOR (1.0.0 -> 2.0.0): Add "BREAKING CHANGE:" in the commit footer 
#    OR use "feat!: ..." / "fix!: ...".
#    Example: `git commit -m "feat!: complete redesign of auth flow"`
#
# If no keywords are found, it defaults to a PATCH bump.
# ==============================================================================

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  distribute:
    name: Build & Distribute
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Required to create tags/releases

    steps:
      - name: 📚 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for semantic-release to see history

      - name: 🏷️ Determine Next Version
        id: semantic
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"
          change_path: "lib/" # Only bump if code in lib changes (optional)

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🦜 Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 📦 Install dependencies
        run: |
          flutter pub get
          cd android
          bundle install

      - name: 🏗️ Run build_runner
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: 🔑 Restore Firebase Configs
        run: |
          # Create directories if they don't exist
          mkdir -p android/app
          mkdir -p lib
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
          echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 -d > lib/firebase_options.dart

      - name: 🔑 Restore Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          echo "storeFile=upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties

      - name: 🔍 Check Keystore SHA-1 (Diagnostic)
        run: |
          keytool -list -v -keystore android/app/upload-keystore.jks -alias ${{ secrets.ANDROID_KEY_ALIAS }} -storepass ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 🚀 Run Shorebird & Fastlane
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          NEW_VERSION: ${{ steps.semantic.outputs.version }}
        run: |
          # Build with Shorebird using the automated version
          echo "Building version: $NEW_VERSION"
          shorebird release android --artifact apk -- --build-name=$NEW_VERSION --build-number=${{ github.run_number }}
          
          cd android
          # Run Fastlane to upload to Firebase
          bundle exec fastlane firebase_dist
