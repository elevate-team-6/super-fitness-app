name: "Validate Branch Name"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate-branch:
    name: "Validate Branch Name"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Branch Name Format
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Checking branch name: $BRANCH_NAME"
          
          REGEX="^((feature|bugfix|hotfix|refactor)/SF-[0-9]+-[a-zA-Z0-9_.-]+|develop)$"
          if [[ ! $BRANCH_NAME =~ $REGEX ]]; then
            echo "❌ Error: Wrong branch name format!"
            echo "Your branch: $BRANCH_NAME"
            echo "Expected format: branch-type/FA6-TicketNum-description OR develop"
            echo "Example: feature/FA6-16-validate-branch-name or develop"
            exit 1
          else
            echo "✅ Success: Branch name matches the team pattern!"
          fi